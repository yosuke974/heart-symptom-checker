<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>心臓・血管 症状チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #e84545;
    --accent2: #ff6b6b;
    --gold: #c9a84c;
    --text: #e8eaf0;
    --muted: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh; overflow-x:hidden;
  }
  .bg-grid {
    position:fixed; inset:0; z-index:0;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%,rgba(232,69,69,0.12) 0%,transparent 70%),
      linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
    background-size:100% 100%,32px 32px,32px 32px;
    pointer-events:none;
  }
  #app {
    position:relative; z-index:1;
    max-width:430px; margin:0 auto;
    min-height:100vh; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,34px);
  }
  .app-header {
    padding:20px 24px 16px;
    display:flex; align-items:center; gap:14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .heart-icon {
    width:44px; height:44px;
    background:linear-gradient(135deg,#e84545,#c0392b);
    border-radius:14px; display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:0 4px 16px rgba(232,69,69,0.4);
    animation:heartbeat 1.8s ease-in-out infinite; flex-shrink:0;
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)} 14%{transform:scale(1.15)}
    28%{transform:scale(1)} 42%{transform:scale(1.08)} 70%{transform:scale(1)}
  }
  .header-text h1 { font-family:'Noto Serif JP',serif; font-size:17px; font-weight:700; }
  .header-text p  { font-size:11px; color:var(--muted); margin-top:2px; }

.screen { display:none; flex:1; flex-direction:column; }
.screen.active { display:flex; }

/* INPUT */
#input-screen { overflow-y:auto; -webkit-overflow-scrolling:touch; }
.section-label {
font-size:11px; font-weight:500; letter-spacing:0.1em;
color:var(–gold); text-transform:uppercase; padding:0 24px; margin-bottom:10px;
}
.chips-area { padding:18px 24px 0; }
.chips-scroll { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.chip {
background:var(–surface2); border:1px solid var(–border);
color:var(–text); font-family:‘Noto Sans JP’,sans-serif;
font-size:13px; padding:7px 14px; border-radius:100px;
cursor:pointer; transition:all 0.2s; white-space:nowrap; -webkit-user-select:none;
}
.chip:active { transform:scale(0.95); }
.chip.selected { background:rgba(232,69,69,0.2); border-color:var(–accent); color:var(–accent2); }
.input-area { padding:20px 24px 0; }
textarea {
width:100%; min-height:110px;
background:var(–surface2); border:1px solid var(–border);
border-radius:16px; color:var(–text);
font-family:‘Noto Sans JP’,sans-serif; font-size:15px; line-height:1.7;
padding:16px; resize:none; outline:none; transition:border-color 0.2s;
caret-color:var(–accent2); margin-top:10px; -webkit-appearance:none;
}
textarea::placeholder { color:var(–muted); }
textarea:focus { border-color:rgba(232,69,69,0.5); }
.meta-area { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px 24px 0; }
.meta-card { background:var(–surface2); border:1px solid var(–border); border-radius:14px; padding:14px; }
.meta-card label { font-size:10px; color:var(–gold); letter-spacing:0.08em; text-transform:uppercase; display:block; margin-bottom:8px; }
.meta-card select { width:100%; background:transparent; border:none; color:var(–text); font-family:‘Noto Sans JP’,sans-serif; font-size:13px; outline:none; -webkit-appearance:none; cursor:pointer; }
.meta-card select option { background:#1a2235; }
.submit-area { padding:24px 24px 0; }
.btn-primary {
width:100%; padding:18px;
background:linear-gradient(135deg,#e84545,#c0392b);
border:none; border-radius:16px; color:#fff;
font-family:‘Noto Sans JP’,sans-serif; font-size:16px; font-weight:500;
letter-spacing:0.05em; cursor:pointer;
box-shadow:0 8px 24px rgba(232,69,69,0.35); transition:all 0.2s; -webkit-appearance:none;
}
.btn-primary:active { transform:scale(0.98); }
.btn-primary:disabled { opacity:0.5; pointer-events:none; }
.disclaimer {
margin:16px 24px 16px; padding:12px 14px;
background:rgba(201,168,76,0.07); border:1px solid rgba(201,168,76,0.2);
border-radius:12px; font-size:11px; color:rgba(201,168,76,0.8); line-height:1.6;
}

/* LOADING */
#loading-screen { align-items:center; justify-content:center; gap:20px; text-align:center; padding:40px; }
.ecg-container { width:200px; height:60px; }
.ecg-line {
stroke:var(–accent); stroke-width:2; fill:none;
stroke-dasharray:600; stroke-dashoffset:600;
animation:ecg-draw 1.5s ease-out forwards infinite;
}
@keyframes ecg-draw {
0%{stroke-dashoffset:600;opacity:1} 70%{stroke-dashoffset:0;opacity:1}
90%{opacity:0.3} 100%{stroke-dashoffset:0;opacity:0}
}
.loading-text { font-size:14px; color:var(–muted); animation:pulse-text 1.5s ease-in-out infinite; }
@keyframes pulse-text { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* RESULT */
#result-screen { overflow-y:auto; -webkit-overflow-scrolling:touch; }
.result-header { padding:20px 24px 16px; border-bottom:1px solid var(–border); }
.result-header h2 { font-family:‘Noto Serif JP’,serif; font-size:18px; font-weight:700; margin-bottom:4px; }
.result-header p { font-size:12px; color:var(–muted); }
.urgency-banner {
margin:16px 24px 0; padding:14px 18px; border-radius:14px;
display:flex; align-items:center; gap:12px; font-size:14px; font-weight:500;
}
.urgency-banner.red  { background:rgba(232,69,69,0.15); border:1px solid rgba(232,69,69,0.4); color:#ff8080; }
.urgency-banner.yellow { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.3); color:#d4a84b; }
.urgency-banner.green { background:rgba(52,199,89,0.1); border:1px solid rgba(52,199,89,0.3); color:#4cd964; }
.urgency-icon { font-size:22px; flex-shrink:0; }
.result-content { padding:0 24px 24px; }
.result-section { margin-top:20px; background:var(–surface2); border:1px solid var(–border); border-radius:16px; overflow:hidden; }
.result-section-header { padding:14px 18px; border-bottom:1px solid var(–border); display:flex; align-items:center; gap:10px; }
.result-section-header span:first-child { font-size:18px; }
.result-section-header strong { font-size:13px; font-weight:600; color:var(–gold); letter-spacing:0.05em; }
.result-body-text { padding:16px 18px; font-size:14px; line-height:1.8; color:#c8cdd8; }
.disease-item { display:flex; align-items:flex-start; gap:10px; padding:10px 18px; border-bottom:1px solid var(–border); }
.disease-item:last-child { border-bottom:none; }
.disease-prob {
min-width:42px; height:42px; border-radius:10px;
background:rgba(232,69,69,0.15); border:1px solid rgba(232,69,69,0.3);
display:flex; align-items:center; justify-content:center;
font-size:11px; font-weight:600; color:var(–accent2); flex-shrink:0; text-align:center; line-height:1.3;
}
.disease-name { font-size:14px; font-weight:500; margin-bottom:3px; }
.disease-desc { font-size:12px; color:var(–muted); line-height:1.6; }
.advice-item { display:flex; gap:10px; padding:8px 18px; border-bottom:1px solid var(–border); font-size:13px; line-height:1.7; }
.advice-item:last-child { border-bottom:none; }
.advice-num {
min-width:22px; height:22px; background:rgba(201,168,76,0.15);
border-radius:50%; display:flex; align-items:center; justify-content:center;
font-size:11px; color:var(–gold); font-weight:600; flex-shrink:0; margin-top:2px;
}
.reference-tag {
display:inline-block; background:rgba(107,114,128,0.2);
border:1px solid rgba(107,114,128,0.3); border-radius:6px;
padding:2px 8px; font-size:10px; color:var(–muted); margin:2px 3px 2px 0;
}
.emergency-cta {
margin:16px 24px 0; padding:18px;
background:linear-gradient(135deg,rgba(232,69,69,0.2),rgba(192,57,43,0.2));
border:1px solid rgba(232,69,69,0.5); border-radius:16px; text-align:center;
}
.emergency-cta p { font-size:13px; color:#ff8080; margin-bottom:12px; }
.emergency-cta a {
display:inline-block; background:var(–accent); color:#fff; text-decoration:none;
padding:12px 32px; border-radius:12px; font-size:16px; font-weight:600;
}
.btn-back {
margin:24px 24px 0; width:calc(100% - 48px); padding:16px;
background:var(–surface2); border:1px solid var(–border);
border-radius:14px; color:var(–text); font-family:‘Noto Sans JP’,sans-serif;
font-size:15px; cursor:pointer; -webkit-appearance:none; transition:all 0.2s;
}
.btn-back:active { transform:scale(0.98); }
</style>

</head>
<body>
<div class="bg-grid"></div>
<div id="app">
  <header class="app-header">
    <div class="heart-icon">❤️</div>
    <div class="header-text">
      <h1>心臓・血管 症状チェッカー</h1>
      <p>公的ガイドライン準拠 AI 診断支援</p>
    </div>
  </header>

  <!-- INPUT -->

  <div id="input-screen" class="screen active">
    <div class="chips-area">
      <div class="section-label">よくある症状（複数選択可）</div>
      <div class="chips-scroll" id="chips-container"></div>
    </div>
    <div class="input-area">
      <div class="section-label" style="margin-top:4px;">詳しく教えてください</div>
      <textarea id="symptom-input" placeholder="例：左胸が締め付けられるように痛く、左腕にしびれがあります。運動するとひどくなります。"></textarea>
    </div>
    <div class="meta-area">
      <div class="meta-card">
        <label>症状が続いている期間</label>
        <select id="duration-select">
          <option value="突然">突然（今すぐ）</option>
          <option value="数分以内">数分以内</option>
          <option value="数時間">数時間</option>
          <option value="数日">数日</option>
          <option value="1週間以上">1週間以上</option>
          <option value="1ヶ月以上">1ヶ月以上</option>
        </select>
      </div>
      <div class="meta-card">
        <label>症状の強さ</label>
        <select id="severity-select">
          <option value="軽度">軽度</option>
          <option value="中程度">中程度</option>
          <option value="強い">強い</option>
          <option value="非常に強い">非常に強い</option>
        </select>
      </div>
    </div>
    <div class="submit-area">
      <button class="btn-primary" id="analyze-btn" onclick="analyzeSymptoms()">症状を解析する</button>
    </div>
    <div class="disclaimer">
      ⚠️ 本アプリは厚生労働省・日本循環器学会等の公的ガイドラインに基づく情報提供を目的としています。医師による診断・治療の代替ではありません。緊急時は直ちに119番へ。
    </div>
  </div>

  <!-- LOADING -->

  <div id="loading-screen" class="screen">
    <svg class="ecg-container" viewBox="0 0 200 60">
      <path class="ecg-line" d="M0,30 L30,30 L40,30 L50,10 L60,50 L70,15 L80,30 L130,30 L140,30 L150,10 L160,50 L170,15 L180,30 L200,30"/>
    </svg>
    <div class="loading-text">ガイドラインを参照して解析中…</div>
  </div>

  <!-- RESULT -->

  <div id="result-screen" class="screen">
    <div class="result-header">
      <h2>解析結果</h2>
      <p>AI解析 + 公的ガイドライン参照</p>
    </div>
    <div id="result-dynamic"></div>
    <button class="btn-back" onclick="goBack()">← もう一度入力する</button>
    <div style="height:24px;"></div>
  </div>
</div>

<script>
const CHIPS = [
  '胸の痛み・圧迫感','胸のしめつけ','左腕のしびれ',
  '動悸・不整脈','息切れ','呼吸困難',
  '急な冷や汗','めまい・ふらつき','顔面蒼白',
  '足のむくみ','失神・意識消失','頭痛',
  '頸部・顎の痛み','背中の痛み','吐き気',
];
const chipsEl = document.getElementById('chips-container');
let selectedChips = new Set();
CHIPS.forEach(s => {
  const el = document.createElement('button');
  el.className = 'chip'; el.textContent = s;
  el.onclick = () => {
    if (selectedChips.has(s)) { selectedChips.delete(s); el.classList.remove('selected'); }
    else { selectedChips.add(s); el.classList.add('selected'); }
  };
  chipsEl.appendChild(el);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack() { showScreen('input-screen'); }

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const SYSTEM = `あなたは心疾患・血管疾患の専門家として、日本の公的医療ガイドライン（厚生労働省、日本循環器学会、日本不整脈心電学会、日本心不全学会、日本高血圧学会等）に基づき、患者の症状から考えられる疾患・体の状態を教育的に説明し、生活改善アドバイスを提供します。

応答は必ずJSON形式のみで返してください。コード囲みやマークダウンは一切含めないでください。

{
  "urgency": "emergency" | "soon" | "monitor",
  "urgency_message": "緊急度の説明（1文）",
  "conditions": [{"name":"疾患名","likelihood":"高|中|低","description":"説明（2〜3文）","guideline_ref":"参照ガイドライン"}],
  "body_state": "現在の体の状態（2〜3文）",
  "advice": ["アドバイス（各1〜2文）"],
  "when_to_call_119": "119番を呼ぶべき状況",
  "references": ["ガイドライン名"]
}
conditions最大4件、advice最大6件。必ずJSON単体のみ返すこと。`;

async function analyzeSymptoms() {
  const text = document.getElementById('symptom-input').value.trim();
  const chips = [...selectedChips];
  if (!text && chips.length === 0) { alert('症状を選択または入力してください。'); return; }

  const duration = document.getElementById('duration-select').value;
  const severity = document.getElementById('severity-select').value;
  const userMsg = (chips.length > 0 ? '選択された症状: ' + chips.join('、') + '\n' : '')
    + '詳細: ' + (text || '（なし）') + '\n継続期間: ' + duration + '\n症状の強さ: ' + severity;

  showScreen('loading-screen');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!res.ok) { const e = await res.text(); throw new Error('API ' + res.status + ': ' + e); }

    const data = await res.json();
    const raw = (data.content||[]).map(b=>b.text||'').join('');
    let parsed;
    try {
      const m = raw.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(m ? m[0] : raw);
    } catch(_) {
      parsed = { urgency:'monitor', urgency_message:'解析完了', conditions:[], body_state:raw, advice:['症状が続く場合は医療機関を受診してください。'], when_to_call_119:'急激な悪化・激しい胸痛・意識消失がある場合は119番へ。', references:[] };
    }
    renderResult(parsed);
    showScreen('result-screen');
  } catch(err) {
    showScreen('input-screen');
    alert('エラー: ' + err.message);
  }
}

function renderResult(d) {
  const u = { emergency:{cls:'red',icon:'🚨'}, soon:{cls:'yellow',icon:'⚠️'}, monitor:{cls:'green',icon:'✅'} }[d.urgency] || {cls:'green',icon:'✅'};
  let h = `<div class="urgency-banner ${u.cls}"><span class="urgency-icon">${u.icon}</span><span>${escHtml(d.urgency_message)}</span></div>`;

  if (d.urgency === 'emergency') {
    h += `<div class="emergency-cta"><p>今すぐ救急車を呼んでください</p><a href="tel:119">📞 119番に電話する</a></div>`;
  }

  h += `<div class="result-content">`;

  h += `<div class="result-section"><div class="result-section-header"><span>🫀</span><strong>現在の体の状態</strong></div><div class="result-body-text">${escHtml(d.body_state)}</div></div>`;

  if (d.conditions?.length) {
    h += `<div class="result-section"><div class="result-section-header"><span>🔍</span><strong>考えられる疾患・状態</strong></div>`;
    d.conditions.forEach(c => {
      h += `<div class="disease-item"><div class="disease-prob">可能性<br>${escHtml(c.likelihood)}</div><div><div class="disease-name">${escHtml(c.name)}</div><div class="disease-desc">${escHtml(c.description)}</div>${c.guideline_ref?`<span class="reference-tag">📋 ${escHtml(c.guideline_ref)}</span>`:''}</div></div>`;
    });
    h += `</div>`;
  }

  if (d.advice?.length) {
    h += `<div class="result-section"><div class="result-section-header"><span>💡</span><strong>改善・対処のアドバイス</strong></div>`;
    d.advice.forEach((a,i) => { h += `<div class="advice-item"><span class="advice-num">${i+1}</span><span>${escHtml(a)}</span></div>`; });
    h += `</div>`;
  }

  if (d.when_to_call_119) {
    h += `<div class="result-section"><div class="result-section-header"><span>🚑</span><strong>119番・受診の目安</strong></div><div class="result-body-text">${escHtml(d.when_to_call_119)}</div></div>`;
  }

  if (d.references?.length) {
    h += `<div class="result-section"><div class="result-section-header"><span>📚</span><strong>参照ガイドライン</strong></div><div style="padding:12px 18px;">`;
    d.references.forEach(r => { h += `<span class="reference-tag">📋 ${escHtml(r)}</span>`; });
    h += `</div></div>`;
  }

  h += `<div class="disclaimer" style="margin-top:20px;">本結果は教育目的の情報提供であり、医師による診断・治療の代替ではありません。症状が続く場合や不安な場合は、必ず医療機関を受診してください。</div>`;
  h += `</div>`;
  document.getElementById('result-dynamic').innerHTML = h;
}
</script>

</body>
</html>
